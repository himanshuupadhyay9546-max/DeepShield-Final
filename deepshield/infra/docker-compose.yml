version: "3.9"

# ── DeepShield Enterprise — Docker Compose ────────────────────────────────
# Brings up: FastAPI, Celery workers, PostgreSQL, Redis, MLflow, MinIO (S3 local)
# Usage: docker compose up --build

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://deepshield:deepshield@postgres:5432/deepshield
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET: deepshield-media
  MLFLOW_TRACKING_URI: http://mlflow:5000
  JWT_SECRET: change-this-in-production-min-32-chars
  JWT_EXPIRE_SECONDS: "3600"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:3001"
  ALLOWED_HOSTS: "*"
  MODEL_DIR: /app/models

services:
  # ── API Gateway ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
      - model-weights:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn api_gateway.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Workers ──────────────────────────────────────────────────────
  worker-detection:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
      - model-weights:/app/models
    depends_on:
      - api
      - redis
    command: >
      celery -A core.celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=detection,default
      --hostname=worker-detection@%h
    restart: unless-stopped

  worker-reports:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    environment:
      <<: *common-env
    command: >
      celery -A core.celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=reports
      --hostname=worker-reports@%h
    restart: unless-stopped

  worker-ml-training:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    environment:
      <<: *common-env
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: >
      celery -A core.celery_app worker
      --loglevel=info
      --concurrency=1
      --queues=ml_training
      --hostname=worker-training@%h
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    environment:
      <<: *common-env
    command: celery -A core.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: deepshield-api:latest
    environment:
      <<: *common-env
      FLOWER_BASIC_AUTH: admin:deepshield
    ports:
      - "5555:5555"
    command: celery -A core.celery_app flower --port=5555
    depends_on:
      - redis

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    restart: unless-stopped

  # ── Databases ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deepshield
      POSTGRES_PASSWORD: deepshield
      POSTGRES_DB: deepshield
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass deepshield
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "deepshield", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Object Storage (S3 compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── MLflow ───────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://deepshield:deepshield@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://deepshield-media/mlflow-artifacts
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - minio
    command: >
      mlflow server
      --backend-store-uri postgresql://deepshield:deepshield@postgres:5432/mlflow
      --default-artifact-root s3://deepshield-media/mlflow-artifacts
      --host 0.0.0.0 --port 5000
    restart: unless-stopped

  # ── Monitoring ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: deepshield
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  model-weights:
  grafana-data:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
